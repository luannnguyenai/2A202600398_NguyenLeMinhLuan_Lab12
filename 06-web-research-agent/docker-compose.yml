services:
  agent:
    build: .
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APP_NAME: ${APP_NAME:-Web Research Agent}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-5-mini}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      AGENT_API_KEY: ${AGENT_API_KEY:-dev-key-change-me}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
      REDIS_URL: redis://redis:6379/0
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-604800}
      MAX_HISTORY_MESSAGES: ${MAX_HISTORY_MESSAGES:-12}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-10}
      MONTHLY_BUDGET_USD: ${MONTHLY_BUDGET_USD:-10.0}
      SEARCH_RESULTS_LIMIT: ${SEARCH_RESULTS_LIMIT:-5}
      FETCH_MAX_MARKDOWN_CHARS: ${FETCH_MAX_MARKDOWN_CHARS:-8000}
      MAX_TOOL_ROUNDS: ${MAX_TOOL_ROUNDS:-4}
      CRAWLER_PAGE_TIMEOUT_MS: ${CRAWLER_PAGE_TIMEOUT_MS:-20000}
      INPUT_COST_PER_1K_TOKENS_USD: ${INPUT_COST_PER_1K_TOKENS_USD:-0.00025}
      OUTPUT_COST_PER_1K_TOKENS_USD: ${OUTPUT_COST_PER_1K_TOKENS_USD:-0.002}
      SEARCH_TOOL_COST_USD: ${SEARCH_TOOL_COST_USD:-0.001}
      FETCH_TOOL_COST_USD: ${FETCH_TOOL_COST_USD:-0.002}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - agent_net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - agent_net

  nginx:
    image: nginx:alpine
    depends_on:
      - agent
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - agent_net

networks:
  agent_net:
    driver: bridge
