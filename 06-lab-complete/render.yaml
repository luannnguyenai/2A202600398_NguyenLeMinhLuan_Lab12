services:
  - type: web
    name: ai-agent-production
    runtime: docker
    rootDir: 06-lab-complete
    region: singapore
    plan: free
    healthCheckPath: /ready
    autoDeployTrigger: commit
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: "1.0.0"
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_TIMEOUT_SECONDS
        value: "30"
      - key: REDIS_URL
        sync: false
      - key: AGENT_API_KEY
        generateValue: true
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: MONTHLY_BUDGET_USD
        value: "10.0"
      - key: LOG_LEVEL
        value: "INFO"
